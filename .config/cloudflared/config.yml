# Single source of truth for the `local8000` tunnel (d21fa304).
# Symlinked to BOTH consumers (see install.sh):
#   ~/.cloudflared/config.yml    -> manual `cloudflared tunnel run`
#   ~/.ai-daemon/cloudflared.yml -> always-on launchd job `com.nors.cloudflared`
# Keep all routes here so the two consumers never diverge.
ingress:
  # nors ai-daemon dashboard (always-on)
  - hostname: daemon.prebenhafnor.com
    service: http://localhost:8787
  # local dev services
  - hostname: local3000.prebenhafnor.com
    service: http://localhost:3000
  - hostname: local8000.prebenhafnor.com
    service: http://localhost:8000
  - hostname: local8001.prebenhafnor.com
    service: http://localhost:8001
  - service: http_status:404
